<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho simples yey</title>
</head>

<body>

<h1 style="text-align: center;">🎲Bem vindo a Programação Web🎲</h1>
<div style="text-align: center; margin: 20px 0;">
<img src="Isagi.jfif" alt="Nerdola" width="200" border="4">
</div>
<form>
    <p>Digite sua palavra:</p><input type="text" id="meuInput" placeholder="Digite uma palavra ...">
    <button type="button" onclick="mostrarNome()">Alterar</button>
</form>

<p>Última palavra digitada : <span id="resultadoTexto"></span></p>

<h2>Calculadora (╯°□°）╯︵ ┻━┻</h2>

<input type="number" id="num1" placeholder="Número 1">
<input type="number" id="num2" placeholder="Número 2">
<button type="button" onclick="somar()">Somar</button>

<p>Soma: <span id="resultadoSoma"></span></p>

<script>
function mostrarNome() {
    var texto = document.getElementById('meuInput').value;
    document.getElementById('resultadoTexto').innerText = texto;
}

function somar() {
    const n1 = parseFloat(document.getElementById('num1').value);
    const n2 = parseFloat(document.getElementById('num2').value);
    const soma = n1 + n2;
    document.getElementById('resultadoSoma').innerText = soma;
}
</script>

</body>
</html>
